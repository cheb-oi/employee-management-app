<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Contract</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="new_contract.html">New Contract</a>
        <a href="view_contracts.html">View all Contracts</a>
    </nav>

    <main>
        <h1>Add New Contact</h1>
        <form>
            <div>
                <label for="IDNumber">ID Number:</label>
                <input type="text" id="IDNumber" name="IDNumber" placeholder="Enter Identification Number">
            </div>
            <div>
                <label for="FirstName">First name:</label>
                <input type="text" id="FirstName" name="FirstName" placeholder="Enter Your First Name">
            </div>
            <div>
                <label for="LastName">Last name:</label>
                <input type="text" id="LastName" name="LastName" placeholder="Enter Your Last Name">
            </div>
            <div>
                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
            </div>
            <div>
                <label for="Phone">Phone:</label>
                <input type="tel" id="Phone" name="Phone" placeholder="+254">
            </div>
            <div>
                <label for="Email">Email:</label>
                <input type="email" id="Email" name="Email" placeholder="Enter Your Email">
            </div>
            <div>
                <label for="position">Position:</label>
                <select id="position" name="position">
                    <option value="">Select Your Position(Optional)</option>
                    <option value="Branch Manager"> Branch Manager</option>
                    <option value="Web Designer"> Web Designer</option>
                    <option value="System Developer"> System Developer</option>
                    <option value="Human Resource">Human Resource</option>
                    <option value="Account Manager">Account Manager</option>
                </select>
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>
</body>
</html>
